<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#075e54">
  <title>坤驊房仲 AI Pro V7</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body>
  <section id="roleScreen" class="role-screen">
    <header class="topbar pick-top">
      <div>
        <h1 id="pickSlogan">買賣房屋🏠，來找我👍</h1>
        <p>請選擇使用者身份</p>
      </div>
      <button class="home-icon" aria-label="首頁">⌂</button>
    </header>

    <main class="role-main">
      <h2>請選擇使用者</h2>
      <p class="sub">選擇後將進入專屬名片模式</p>
      <button class="role-card" data-role="kunhua">
        <img src="assets/kunhua.jpg" alt="張坤驊">
        <span><b>張坤驊</b><small>中信房屋 中壢高中加盟店</small><small>☎ 0939-902-943　LINE：aj7229</small></span><i>›</i>
      </button>
      <button class="role-card orange" data-role="shiyun">
        <img src="assets/shiyun.jpg" alt="王詩芸">
        <span><b>王詩芸</b><small>中信房屋 中壢高中加盟店</small><small>☎ 0930-262-215　LINE：0930262215</small></span><i>›</i>
      </button>
      <button class="role-card blue" data-role="joint">
        <div class="dual-thumb"><img src="assets/kunhua.jpg" alt="張坤驊"><img src="assets/shiyun.jpg" alt="王詩芸"></div>
        <span><b>聯名模式</b><small>張坤驊 × 王詩芸</small><small>雙人服務．聯手成交</small></span><i>›</i>
      </button>
    </main>
  </section>

  <section id="appScreen" class="app-screen hidden">
    <header class="appbar">
      <button class="menu-btn" id="backToRoles">☰</button>
      <h1 id="appSlogan">買賣房屋🏠，來找我👍</h1>
      <button class="switch-btn" id="switchRole">👤 切換使用者</button>
    </header>

    <main class="app-main">
      <section class="namecard" id="namecard"></section>
      <section class="quick-actions">
        <button id="callBtn">☎<span>撥打電話</span></button>
        <button id="lineBtn">LINE<span>加入LINE</span></button>
        <button id="shareBtn">↗<span>分享名片</span></button>
        <button id="qrBtn">▦<span>我的QR碼</span></button>
      </section>

      <nav class="tabs">
        <button class="tab active" data-page="buyer">買方試算</button>
        <button class="tab" data-page="seller">賣方試算</button>
        <button class="tab" data-page="income">收入反推</button>
        <button class="tab" data-page="compare">貸款比較</button>
      </nav>

      <section id="buyer" class="page active">
        <div class="card"><h2>買方試算</h2><div class="grid">
          <label>房價（萬元）<input id="price" type="number" value="2000"></label>
          <label>貸款成數<select id="ltv"><option value="0.5">5成</option><option value="0.55">5.5成</option><option value="0.6">6成</option><option value="0.65">6.5成</option><option value="0.7">7成</option><option value="0.75">7.5成</option><option value="0.8" selected>8成</option></select></label>
          <label>利率方案<select id="ratePreset"><option value="1.775" selected>新青安概估 1.775%</option><option value="2.06">一般首購 2.06%</option><option value="2.185">一般房貸 2.185%</option><option value="custom">自訂</option></select></label>
          <label>年利率（%）<input id="rate" type="number" step="0.001" value="1.775"></label>
          <label>貸款年限<select id="years"><option>30</option><option>35</option><option selected>40</option></select></label>
          <label>寬限期<select id="grace"><option value="0">無</option><option>1</option><option>2</option><option>3</option><option>4</option><option selected>5</option></select></label>
          <label>仲介費計算<select id="agentMode"><option value="0.01">1%</option><option value="0.02" selected>2%</option><option value="0.03">3%</option><option value="0.04">4%</option><option value="0.05">5%</option><option value="0.06">6%</option><option value="customRate">自行輸入%</option><option value="fixed">固定金額</option></select></label>
          <label id="agentCustomRateWrap" class="hide">自行輸入費率（%）<input id="agentCustomRate" type="number" step="0.1" value="2"></label>
          <label id="agentFixedWrap" class="hide">固定仲介費（萬元）<input id="agentFixed" type="number" value="40"></label>
          <label class="readonly">仲介費（自動）<input id="agentPreview" type="text" value="40 萬" readonly></label>
          <label>雜費/代書/保險（萬元）<input id="misc" type="number" value="5"></label>
        </div><button class="primary" onclick="calcAll()">立即試算</button></div>
        <div class="card results"><div class="tile"><b>貸款金額</b><span id="loanAmt">-</span></div><div class="tile"><b>自備款</b><span id="downPay">-</span></div><div class="tile"><b>寬限期月付</b><span id="ioPay">-</span></div><div class="tile"><b>寬限期後月付</b><span id="mPay">-</span></div><div class="tile big"><b>建議準備現金</b><span id="cashNeed">-</span></div><div class="tile"><b>建議家庭月收入</b><span id="needIncome">-</span></div></div>
        <div class="card actions"><button onclick="copyBuyer()">複製 LINE 試算</button><button onclick="window.print()">列印 / 存 PDF</button></div>
      </section>

      <section id="seller" class="page"><div class="card"><h2>賣方實拿概估</h2><div class="grid">
        <label>成交價（萬元）<input id="salePrice" type="number" value="2000"></label>
        <label>貸款餘額（萬元）<input id="mortLeft" type="number" value="800"></label>
        <label>仲介費計算<select id="sellerFeeMode"><option value="0.01">1%</option><option value="0.02" selected>2%</option><option value="0.03">3%</option><option value="0.04">4%</option><option value="0.05">5%</option><option value="0.06">6%</option><option value="customRate">自行輸入%</option><option value="fixed">固定金額</option></select></label>
        <label id="sellerCustomRateWrap" class="hide">自行輸入費率（%）<input id="sellerCustomRate" type="number" step="0.1" value="2"></label>
        <label id="sellerFixedWrap" class="hide">固定仲介費（萬元）<input id="sellerFixed" type="number" value="40"></label>
        <label class="readonly">仲介費（自動）<input id="sellerFeePreview" type="text" value="40 萬" readonly></label>
        <label>稅費概估（萬元）<input id="sellerTax" type="number" value="30"></label>
        <label>代書/塗銷雜費（萬元）<input id="sellerMisc" type="number" value="3"></label>
      </div><button class="primary" onclick="calcAll()">立即試算</button></div>
      <div class="card results"><div class="tile"><b>仲介費</b><span id="sellerFee">-</span></div><div class="tile"><b>稅費概估</b><span id="sellerTaxShow">-</span></div><div class="tile"><b>清償貸款</b><span id="mortShow">-</span></div><div class="tile big"><b>屋主實拿概估</b><span id="sellerNet">-</span></div></div></section>

      <section id="income" class="page"><div class="card"><h2>收入反推</h2><div class="grid">
        <label>家庭月收入（元）<input id="famIncome" type="number" value="150000"></label>
        <label>可用自備現金（萬元）<input id="cashOnHand" type="number" value="450"></label>
        <label>可接受負債比<select id="dti"><option value="0.3">保守30%</option><option value="0.35" selected>標準35%</option><option value="0.4">積極40%</option></select></label>
        <label>貸款成數<select id="ltv2"><option value="0.5">5成</option><option value="0.55">5.5成</option><option value="0.6">6成</option><option value="0.65">6.5成</option><option value="0.7">7成</option><option value="0.75">7.5成</option><option value="0.8" selected>8成</option></select></label>
      </div><button class="primary" onclick="calcAll()">立即反推</button></div><div class="card results"><div class="tile big"><b>建議最高總價</b><span id="maxPrice">-</span></div><div class="tile"><b>可承受月付</b><span id="maxMonthly">-</span></div><div class="tile"><b>預估貸款</b><span id="maxLoan">-</span></div><div class="tile"><b>判斷</b><span id="incomeJudge">-</span></div></div></section>

      <section id="compare" class="page"><div class="card"><h2>貸款方案比較</h2><p class="hint">依買方試算的房價、成數、利率自動比較。</p><table><thead><tr><th>方案</th><th>寬限期月付</th><th>寬限期後月付</th></tr></thead><tbody id="compareBody"></tbody></table></div></section>

      <p class="note">本工具為現場快速概估，實際貸款、稅費與核貸條件仍以銀行、政府、代書與合約為準。</p>
    </main>

    <footer class="bottom-nav"><button class="active">⌂<span>首頁</span></button><button>◴<span>歷史紀錄</span></button><button>♡<span>收藏物件</span></button><button>⚙<span>設定</span></button></footer>
  </section>
  <script src="script.js?v=7.0.1"></script>
</body>
</html>
