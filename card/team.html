<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#073e37"><title>張坤驊 × 王詩芸｜電子名片</title><style>
:root{--green:#073e37;--gold:#d8b562;--bg:#f3f7f8;--text:#0d2a25}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#eaf2f5,#fff);font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;color:var(--text)}.wrap{max-width:980px;margin:0 auto;padding:16px 12px 32px}.top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.brand{font-weight:950;color:#063f37;font-size:22px}.card-img{width:100%;border-radius:18px;box-shadow:0 14px 36px rgba(0,0,0,.20);display:block;background:#fff}.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0}.actions a,.actions button{border:0;text-decoration:none;text-align:center;background:#fff;color:#0d2a25;border-radius:16px;padding:12px 8px;box-shadow:0 8px 20px rgba(0,0,0,.10);font-weight:900;font-size:15px}.actions b{display:block;width:42px;height:42px;line-height:42px;margin:0 auto 6px;border-radius:14px;background:#0aa567;color:#fff;font-size:20px}.actions .orange b{background:#f97316}.actions .blue b{background:#1682b6}.actions .gold b{background:#c79a36}.note{text-align:center;color:#51615d;font-weight:700;font-size:13px;line-height:1.6}.qr{max-width:260px;width:80%;display:block;margin:10px auto;border-radius:12px}.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);align-items:center;justify-content:center;padding:20px}.modal.show{display:flex}.modal-card{background:#fff;border-radius:18px;padding:18px;max-width:360px;width:100%;text-align:center;position:relative}.close{position:absolute;right:10px;top:8px;border:0;background:#eee;border-radius:50%;width:34px;height:34px;font-size:24px}@media(max-width:680px){.wrap{padding:10px 8px 24px}.brand{font-size:18px}.actions{grid-template-columns:repeat(2,1fr)}.card-img{border-radius:12px}}
</style></head><body><main class="wrap"><div class="top"><div class="brand">買賣房屋找我們</div><a href="../index.html" style="color:#073e37;font-weight:900;text-decoration:none">回到 AI Pro</a></div><img class="card-img" src="../assets/card-team.jpg?v=9" alt="張坤驊 × 王詩芸 精品電子名片"><section class="actions"><a href="tel:0939902943"><b>☎</b>撥打電話</a><a href="#qr" onclick="openQr();return false;"><b>LINE</b>加入 LINE</a><button class="orange" onclick="shareThis()"><b>↗</b>分享名片</button><button class="blue" onclick="openQr()"><b>▦</b>LINE QR</button></section><p class="note">此頁為純電子名片，不含房貸試算功能；需要試算請回到 AI Pro 主程式。</p></main><div id="qrModal" class="modal"><div class="modal-card"><button class="close" onclick="closeQr()">×</button><div id='qrContent'><h3>選擇 LINE QR Code</h3><img class='qr' src='../assets/qr-kunhua.jpg?v=9' alt='張坤驊 QR'><b>張坤驊｜aj7229</b><img class='qr' src='../assets/qr-shiyun.jpg?v=9' alt='王詩芸 QR'><b>王詩芸｜0930262215</b></div></div></div><script>function openQr(){document.getElementById('qrModal').classList.add('show')}function closeQr(){document.getElementById('qrModal').classList.remove('show')}function shareThis(){const text=document.title+'\n'+location.href;if(navigator.clipboard)navigator.clipboard.writeText(text).then(()=>alert('已複製名片連結，可貼到 LINE 分享。'));else prompt('請複製名片連結：',text)}document.getElementById('qrModal').addEventListener('click',e=>{if(e.target.id==='qrModal')closeQr()})</script></body></html>
